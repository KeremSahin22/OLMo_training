# Frontier (OLCF) config for OLMo-1B replication.
# Based on olmo1b-sample-run.yaml — replace <username> with your OLCF username before using.
#
# Submit with: sbatch scripts/frontier_run.sh

run_name: olmo1b-frontier
seed: 6198
dry_run: false

# === MODEL (identical to OLMo-1B) ===
model:
  d_model: 2048
  n_heads: 16
  n_layers: 16
  mlp_ratio: 8
  weight_tying: true
  alibi: false
  rope: true
  flash_attention: false  # not supported on MI250X
  attention_dropout: 0.0
  attention_layer_norm: false
  multi_query_attention: false
  include_bias: false
  block_type: sequential
  layer_norm_type: default
  layer_norm_with_affine: false
  bias_for_layer_norm: false
  attention_layer_norm_with_affine: false
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 2048
  vocab_size: 50280
  embedding_size: 50304
  eos_token_id: 50279
  pad_token_id: 1
  init_device: meta
  init_fn: mitchell

compile: null  # torch.compile is unstable on ROCm

# === OPTIMIZER (identical to OLMo-1B) ===
optimizer:
  name: adamw
  learning_rate: 4.0e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
  metrics_log_interval: 10

scheduler:
  name: cosine_with_warmup
  t_warmup: 100        # SCALE-UP: revert to 2000
  alpha_f: 0.1

tokenizer:
  identifier: olmo_data/tokenizers/allenai_eleuther-ai-gpt-neox-20b-pii-special.json
  truncate_direction: right

# Lustre scratch — fast I/O, 50TB quota, purged after 90 days of inactivity
save_folder: /lustre/orion/lrn089/scratch/<username>/checkpoints/${run_name}/${oc.env:SLURM_JOB_ID,local}
save_overwrite: false
save_interval: 500
save_num_checkpoints_to_keep: 2
# SCALE-UP: add back unsharded checkpoints for long-term storage:
#   save_interval_unsharded: 10000
#   save_num_unsharded_checkpoints_to_keep: -1

load_path: null

max_duration: "50e9T"  # 50B total tokens seen (masked tokens still count toward this budget)
# global_train_batch_size = num_nodes * gpus_per_node * device_train_microbatch_size
# Default below assumes 1 node × 8 GCDs × 4 = 32. Scale by multiplying num_nodes.
# e.g. 4 nodes: global_train_batch_size: 128
# NOTE: MI250X has 64 GB HBM2e per GCD (vs 80 GB on A100) — if you OOM, reduce
# device_train_microbatch_size first.
global_train_batch_size: 32   # = 1 node × 8 GCDs × 4 microbatch
device_train_microbatch_size: 4

precision: amp_bf16  # bf16 required on MI250X — fp16 causes NaNs

distributed_strategy: fsdp
fsdp:
  wrapping_strategy: null
  precision: mixed

max_grad_norm: 1.0

speed_monitor:
  window_size: 20

wandb:
  name: ${run_name}
  project: olmo-1b-replication

# SCALE-UP: add back evaluators from OLMo-1B.yaml for perplexity tracking

data:
  pad_direction: right
  num_workers: 4         # more workers than local — Lustre handles parallel I/O well
  drop_last: true
  pin_memory: true
  persistent_workers: true   # SCALE-UP default
  prefetch_factor: 16        # SCALE-UP default
  # SCALE-UP: replace with full list of data paths
  paths:
    - /lustre/orion/lrn089/scratch/<username>/data/olmo1b_sample.npy
