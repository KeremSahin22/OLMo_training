run_name: olmo1b-50b-run
seed: 6198
dry_run: false

wandb:
  name: ${run_name}
  project: olmo-small

# === MODEL (identical to OLMo-1B) ===
model:
  d_model: 2048
  n_heads: 16
  n_layers: 16
  mlp_ratio: 8
  weight_tying: true
  alibi: false
  rope: true
  flash_attention: false
  attention_dropout: 0.0
  attention_layer_norm: false
  multi_query_attention: false
  include_bias: false
  block_type: sequential
  layer_norm_type: default
  layer_norm_with_affine: false
  bias_for_layer_norm: false
  attention_layer_norm_with_affine: false
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 2048
  vocab_size: 50280
  embedding_size: 50304
  eos_token_id: 50279
  pad_token_id: 1
  init_device: meta
  init_fn: mitchell

compile: null

# === OPTIMIZER (identical to OLMo-1B) ===
optimizer:
  name: adamw
  learning_rate: 4.0e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
  metrics_log_interval: 10

scheduler:
  name: cosine_with_warmup
  t_warmup: 2000
  alpha_f: 0.1

tokenizer:
  identifier: olmo_data/tokenizers/allenai_eleuther-ai-gpt-neox-20b-pii-special.json
  truncate_direction: right

save_folder: /disk/u/kerem.sahin/data/checkpoints/${run_name}
save_overwrite: false
save_interval: 1000
save_num_checkpoints_to_keep: 9
save_interval_unsharded: 10000
save_num_unsharded_checkpoints_to_keep: -1

load_path: null

# 64,639,083,780 tokens selected by scripts/select_shards.py (target was 50B,
# see configs/data/olmo-mix-50b-shards.yaml) -> one epoch at full batch size:
# ceil(64_639_083_780 / (2048 * 2048)) = 15413
max_duration: 15413
global_train_batch_size: 2048
device_train_microbatch_size: 8

precision: amp_bf16

fsdp:
  wrapping_strategy: null
  precision: mixed

max_grad_norm: 1.0

speed_monitor:
  window_size: 20

# Evaluators omitted here for now -- copy the `evaluators:` block from
# configs/official-0724/OLMo-1B.yaml if/when eval tracking is needed.

data:
  pad_direction: right
  num_workers: 0
  drop_last: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 16
  # Generated by: python scripts/select_shards.py --target-tokens 50_000_000_000 --seed 6198
  # See configs/data/olmo-mix-50b-shards.yaml for the full record (seed, target, actual total).
  paths:
    - https://olmo-data.org/preprocessed/olmo-mix/v1_5/gpt-neox-20b-pii-special/part-035-00000.npy
    - https://olmo-data.org/preprocessed/olmo-mix/v1_5/gpt-neox-20b-pii-special/part-057-00000.npy
    - https://olmo-data.org/preprocessed/olmo-mix/v1_5/gpt-neox-20b-pii-special/part-062-00000.npy
    - https://olmo-data.org/preprocessed/olmo-mix/v1_5/gpt-neox-20b-pii-special/part-008-00000.npy
